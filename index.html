<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmolChat</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <button class="icon-btn" id="sidebar-toggle" aria-label="Close sidebar">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 24 24">
          <path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
        </svg>
      </button>
      <button class="new-chat-btn" id="new-chat-btn" aria-label="New chat">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
        </svg>
        New chat
      </button>
    </div>

    <div class="sidebar-bottom">
      <div class="model-badge" id="model-badge">
        <span class="model-dot" id="model-dot"></span>
        <span id="model-label">Loading model…</span>
      </div>
      <div class="device-badge" id="device-badge">
        <!-- Filled by JS -->
      </div>
    </div>
  </aside>

  <!-- Main -->
  <div class="main" id="main">
    <!-- Topbar (visible when sidebar collapsed) -->
    <header class="topbar" id="topbar">
      <button class="icon-btn" id="topbar-toggle" aria-label="Open sidebar">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 24 24">
          <path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
        </svg>
      </button>
      <span class="topbar-title">SmolChat</span>
    </header>

    <!-- Messages -->
    <div class="messages" id="messages" role="log" aria-live="polite" aria-label="Chat messages">
      <!-- Welcome shown before first message -->
      <div class="welcome" id="welcome">
        <h1>SmolChat</h1>
        <p>Powered by <strong>SmolLM2&nbsp;360M</strong> running entirely in your browser.</p>
        <p class="welcome-sub" id="welcome-status">Initialising…</p>
      </div>
    </div>

    <!-- Input area -->
    <div class="input-area">
      <div class="input-box">
        <textarea
          id="user-input"
          rows="1"
          placeholder="Message SmolChat…"
          aria-label="Message input"
          disabled
        ></textarea>
        <button class="send-btn" id="send-btn" aria-label="Send message" disabled>
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
      <p class="disclaimer">SmolLM2 360M may produce inaccurate information. Runs locally — no data is sent to any server.</p>
    </div>
  </div>

  <!-- Loading overlay -->
  <div class="loading-overlay" id="loading-overlay">
    <div class="loading-card">
      <h2>Loading SmolLM2 360M</h2>
      <p id="loading-status">Preparing…</p>
      <div class="progress-track">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <p id="progress-label" class="progress-label">0%</p>
      <p class="loading-note" id="loading-note">The model is cached after the first download.</p>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
